name: Test Automation CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      test_marker:
        description: 'Test marker to run (smoke, regression, all)'
        required: false
        default: 'all'
      parallel_workers:
        description: 'Number of parallel workers'
        required: false
        default: '4'

env:
  PYTHON_VERSION: '3.12'
  SELENIUM_HUB: 'http://localhost:4444/wd/hub'

jobs:
  lint-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint black bandit

      - name: Run Black (Code Formatting)
        run: black --check src/ --line-length 100

      - name: Run Pylint (Code Quality)
        run: pylint src/ --exit-zero --reports=y || true

      - name: Run Bandit (Security Scan)
        run: bandit -r src/ -f json -o security-report.json || true

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.json

  test-smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-security
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test configuration
        run: |
          cp pytest.ini.example pytest.ini
          # Update with CI-specific values
          sed -i 's|SELENIUM_HUB = http://localhost:4444/wd/hub|SELENIUM_HUB = ${{ env.SELENIUM_HUB }}|g' pytest.ini

      - name: Start Selenium Grid
        run: docker compose up -d

      - name: Wait for Selenium Grid
        run: |
          echo "Waiting for Selenium Grid to be ready..."
          # Loop for max 90 seconds
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:4444/status | jq -r .value.ready)
            if [ "$STATUS" = "true" ]; then
              echo "Selenium Grid is READY!"
              exit 0
            fi
            echo "Grid not ready yet... waiting 3s (Attempt $i)"
            sleep 3
          done
          echo "Error: Selenium Grid timed out after 90 seconds"
          docker compose logs  # Print logs to debug why it failed
          exit 1

      - name: Run Smoke Tests
        run: |
          pytest src/tests/ -m smoke \
            -v \
            --alluredir=allure-results \
            --tb=short \
            || true

      - name: Stop Selenium Grid
        if: always()
        run: docker compose down

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: allure-results/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-smoke
          path: screenshots/

  test-regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: lint-and-security
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    strategy:
      matrix:
        browser: [chrome, firefox]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test configuration
        run: |
          cp pytest.ini.example pytest.ini
          sed -i 's|SELENIUM_HUB = http://localhost:4444/wd/hub|SELENIUM_HUB = ${{ env.SELENIUM_HUB }}|g' pytest.ini

      - name: Start Selenium Grid
        run: docker compose up -d

      - name: Wait for Selenium Grid
        run: |
          echo "Waiting for Selenium Grid to be ready..."
          timeout=60
          while ! curl -s http://localhost:4444/wd/hub/status | grep -q '"ready":true'; do
            timeout=$((timeout-1))
            if [ $timeout -eq 0 ]; then
              echo "Selenium Grid not ready after 60 seconds"
              exit 1
            fi
            sleep 1
          done
          echo "Selenium Grid is ready!"

      - name: Run Regression Tests
        run: |
          pytest src/tests/ \
            -v \
            -n 4 \
            --alluredir=allure-results-${{ matrix.browser }}-py${{ matrix.python-version }} \
            --tb=short \
            -k "not slow" \
            || true

      - name: Stop Selenium Grid
        if: always()
        run: docker compose down

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}-py${{ matrix.python-version }}
          path: allure-results-${{ matrix.browser }}-py${{ matrix.python-version }}/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}-py${{ matrix.python-version }}
          path: screenshots/

  generate-allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [test-smoke, test-regression]
    if: always() && (needs.test-smoke.result == 'success' || needs.test-regression.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure Results (Smoke)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/
        continue-on-error: true

      - name: Download Allure Results (Regression)
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1
        if: always()
        with:
          allure_results: allure-results/
          allure_report: allure-report/
          subfolder: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint-and-security, test-smoke, test-regression, generate-allure-report]
    if: always()

    steps:
      - name: Check Status
        run: |
          echo "## Test Automation Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.lint-and-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.test-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression Tests | ${{ needs.test-regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Allure Report | ${{ needs.generate-allure-report.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report/
        continue-on-error: true

      - name: Publish Test Summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/allure-report/*.xml'
        continue-on-error: true
